<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Matrices Python</title>
  </head>
  <body>
    <h2>Suma y Multiplicación de Matrices (Python - Flask)</h2>

    <label>Filas A:</label>
    <input type="number" id="filasA" />
    <label>Columnas A:</label>
    <input type="number" id="colsA" /><br /><br />

    <label>Filas B:</label>
    <input type="number" id="filasB" />
    <label>Columnas B:</label>
    <input type="number" id="colsB" /><br /><br />

    <button onclick="generarMatrices()">Generar</button>

    <div id="matrices"></div>

    <br />
    <button onclick="sumar()">Sumar</button>
    <button onclick="multiplicar()">Multiplicar</button>

    <h3>Resultado:</h3>
    <div id="resultado"></div>

    <script>
      // generar inputs de matrices
      function generarMatrices() {
        let filasA = document.getElementById("filasA").value;
        let colsA = document.getElementById("colsA").value;
        let filasB = document.getElementById("filasB").value;
        let colsB = document.getElementById("colsB").value;

        let contenedor = document.getElementById("matrices");
        contenedor.innerHTML = "";

        contenedor.appendChild(crearTabla("A", filasA, colsA));
        contenedor.appendChild(crearTabla("B", filasB, colsB));
      }

      // crear tabla de inputs
      function crearTabla(nombre, filas, columnas) {
        let div = document.createElement("div");
        let titulo = document.createElement("h3");
        titulo.innerText = "Matriz " + nombre;
        div.appendChild(titulo);

        for (let i = 0; i < filas; i++) {
          let fila = document.createElement("div");

          for (let j = 0; j < columnas; j++) {
            let input = document.createElement("input");
            input.type = "number";
            input.id = nombre + "_" + i + "_" + j;
            fila.appendChild(input);
          }

          div.appendChild(fila);
        }

        return div;
      }

      // obtener datos con validación
      function obtenerMatriz(nombre, filas, columnas) {
        let matriz = [];

        for (let i = 0; i < filas; i++) {
          let fila = [];

          for (let j = 0; j < columnas; j++) {
            let valor = document.getElementById(
              nombre + "_" + i + "_" + j,
            ).value;

            if (valor === "" || isNaN(valor)) {
              alert("Datos inválidos");
              return null;
            }

            fila.push(Number(valor));
          }

          matriz.push(fila);
        }

        return matriz;
      }

      // mostrar resultado
      function mostrarResultado(matriz) {
        let div = document.getElementById("resultado");
        div.innerHTML = "";

        matriz.forEach((fila) => {
          let p = document.createElement("p");
          p.innerText = fila.join(" ");
          div.appendChild(p);
        });
      }

      // sumar (al servidor Flask)
      async function sumar() {
        let fA = parseInt(document.getElementById("filasA").value);
        let cA = parseInt(document.getElementById("colsA").value);
        let fB = parseInt(document.getElementById("filasB").value);
        let cB = parseInt(document.getElementById("colsB").value);

        if (fA !== fB || cA !== cB) {
          alert("No se pueden sumar");
          return;
        }

        let A = obtenerMatriz("A", fA, cA);
        let B = obtenerMatriz("B", fB, cB);

        if (!A || !B) return;

        let res = await fetch("/sumar", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ A, B }),
        });

        let data = await res.json();
        mostrarResultado(data);
      }

      // multiplicar (al servidor Flask)
      async function multiplicar() {
        let fA = parseInt(document.getElementById("filasA").value);
        let cA = parseInt(document.getElementById("colsA").value);
        let fB = parseInt(document.getElementById("filasB").value);
        let cB = parseInt(document.getElementById("colsB").value);

        if (cA !== fB) {
          alert("No se pueden multiplicar");
          return;
        }

        let A = obtenerMatriz("A", fA, cA);
        let B = obtenerMatriz("B", fB, cB);

        if (!A || !B) return;

        let res = await fetch("/multiplicar", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ A, B }),
        });

        let data = await res.json();
        mostrarResultado(data);
      }
    </script>
  </body>
</html>
